- name: Ayanami Kernel
  version: RC1 | AnyKernel3
  author: LucasMatrixz
  date: 29/03/2026
  link: https://drive.usercontent.google.com/download?id=145h2Dj_XvhnofPFwnPj75dSd9IjwzJnp&export=download
  size: 17.7 MB
  features:
    - Backslashxx KernelSU v3.2.2
    - Introduced BORE scheduler
    - TCP BBR enabled
    - upstream binder to android-mainline
    - mq-deadline is enabled by default
    - Merged Kona
    - st14/cip30
    - Droidspaces support is available
    - >-
      USING A CUSTOM RECOVERY ALONGSIDE THIS KERNEL (ex.: TWRP, OrangeFox or PBRP) is NOT ALLOWED AND WILL BRICK YOUR
      DEVICE
    - "However, using the recovery shipped with a custom ROM (ex.: LineageOS recovery) is FINE"
    - If a bootloop occurs, simply flash the original boot.img or flash the ROM again.
    - >-
      This kernel has only been tested on LineageOS 22.2 and the stock ROM. I have no idea if it will work properly on
      Android 16.
    - "Instruções do desenvolvedor sobre a instalação: Only flash in recovery."
