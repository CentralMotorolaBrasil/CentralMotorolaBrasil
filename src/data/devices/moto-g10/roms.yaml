- name: crDroid
  version: Android 14
  android: Android 14
  author: Samw662
  origin: unofficial
  date: 08/08/2024
  link: https://drive.google.com/drive/folders/12-DG08Wz2E44SaMLkVKJ4Q-lG9-o6PQ6?usp=sharing
  size: 1 GB
  status: stable
  changelog:
    - User build + Assinado (SafetyNet aprovado por padrão)
    - Compilar kernel com clang 17.0.2 (r487747c)
    - Habilitar Multi-gen LRU
    - Definir readahead_size_kb=128 para cada partição física (Para evitar pressão de memória)
    - Melhor gerenciamento de RAM
    - >-
      Usar HintManager para HWUI (Definir margem de 30% para CPU deve reduzir cargas da CPU para HWUI e usar GPU para o
      resto)
    - Algumas sysprops, melhorias de toque
    - Desabilitar downscaler do rotador SDM
    - Importar serviços de perfil dexopt speed (Reduzir RAM e armazenamento)
    - Desabilitar logs de firmware WLAN (E removidos muitos serviços desnecessários relacionados ao WiFi)
    - Silenciar tags de log spam
    - Desabilitar registro de eventos de sensores
    - Remover ajustes supérfluos de ZRAM
    - Mudar para LMKD
    - Aumentar desempenho durante inicialização
    - CPUs de primeiro e segundo plano melhoradas
    - "Sepolicy: Permitir configurar read_ahead_kb na partição /data"
    - Remover cache de pacote na inicialização
    - Desabilitar cache de composição de cliente SF (Ajuda no gerenciamento de fences de clientes framework)
    - Reduzir brilho mínimo permitido
    - Habilitar recurso de autenticação performant
    - Habilitar proteção contra burn-in
    - Configurar doze overlays (AOD não estava funcionando, agora está corrigido com isso)
    - Estamos animados em anunciar o lançamento inicial do crDroid 10.6!
    - >-
      Esta atualização traz os patches de segurança mais recentes, correções de bugs e alguns novos recursos empolgantes
      para elevar sua experiência de usuário
    - Segurança em Primeiro Lugar
    - >-
      crDroid 10.6 incorpora os mais recentes patches de segurança de julho (android-14.0.0_r53), garantindo que seu
      dispositivo esteja protegido contra as vulnerabilidades mais recentes
    - Melhorias de Estabilidade e Desempenho
    - >-
      Adeus, Dreno de Bateria: Corrigido um possível dreno de bateria causado pelo WiFi, mantendo seu dispositivo
      funcionando por mais tempo
    - "Refinamentos do SystemUI:"
    - >-
      Fontes Correspondentes: A fonte do texto do carrier na tela de bloqueio agora se alinha perfeitamente com a fonte
      do sistema para uma aparência uniforme
    - "Limpeza de Ícones: Gaps suspeitos em torno de novos ícones móveis no SystemUI foram eliminados"
    - "Uso de Dados Mais Claro: Informações de uso de dados no Quick Settings melhoradas para uma visão mais abrangente"
    - >-
      Correção de PIP Multi-Usuário: Uma falha no SystemUI relacionada ao Picture-in-Picture (PIP) no cenário
      Multi-Usuário foi resolvida
    - "Correções Gerais de Bugs: Corrigidos vários outros bugs para uma experiência geral mais suave"
    - Melhorias Internas
    - "Atualização do Aperture: Desfrute de uma experiência aprimorada do Aperture com a atualização mais recente"
    - "Webview Melhorado: Webview atualizado para versão 125.0.6422.165 para navegação web aprimorada"
    - "Etar: Atualizações de calendário também adicionadas"
    - "Monet Monet: Corrigidos alguns problemas persistentes do Monet para um tema visual mais consistente"
    - "Seedvault: InstallRestriction para Seedvault foi corrigido, garantindo funcionalidade adequada"
    - >-
      Salvador de Bateria: Um problema de alto uso de CPU causado pelo layout do Quick Settings, que impactava a vida da
      bateria, foi corrigido
    - >-
      Consistência de Brilho: A inconsistência entre valores SCREEN_BRIGHTNESS antes e depois da reinicialização foi
      resolvida
    - Novos Recursos e Funcionalidades
    - >-
      Quick Tap Retorna: O amado recurso Quick Tap está de volta, permitindo realizar ações com duplo toque na parte
      traseira do dispositivo
    - "Integração Glimpse: ThemePicker agora usa o aplicativo Glimpse em vez do Gallery2"
    - "Amor pelos Idiomas: Atualizamos traduções para uma experiência mais inclusiva"
  notes:
    - Agradecimentos especiais ao @mikeioannina por todas as fontes do kernel
    - Firmware Android 11 OBRIGATÓRIO!
    - CrDroidRecovery para flash
  variants:
    - label: Fonte / Telegram
      link: https://t.me/MotoG10BR/426
