- name: HupFck
  version: Final
  author: HotaruOs
  date: 23/01/2026
  link: https://drive.google.com/file/d/1cryzhvl0v6ffE7a3MPuQo-ByA6ePziDh/view?usp=sharing
  size: 27.6 MB
  features:
    - Otimização do modelo de energia
    - Aumento da frequência mínima do LLCC
    - Desativação de entradas desnecessárias
    - Troca da disciplina de fila de rede para fq_codel
    - Adicionado BBR Plus e bloqueador de WL
    - Melhorias gerais no Wi-Fi
    - Forçado o timeout de idle da GPU para 58 ms
    - Desativado o reclaim por processo
    - Adicionado suporte a ROMs em EROFS
    - Habilitado o CONFIG_FAIR_GROUP_SCHED
    - Root via KernelSU (rsuntk)
    - Compilado com Clang AOSP r18
